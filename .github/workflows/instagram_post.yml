name: UBW Instagram Agent

on:
  schedule:
    - cron: '0 15 * * 1-6'   # Slot 1 — 10:00 AM Lima (UTC-5)
    - cron: '0 18 * * 1-6'   # Slot 2 —  1:00 PM Lima
    - cron: '0 21 * * 1-6'   # Slot 3 —  4:00 PM Lima
    - cron: '0 0 * * 0,2-6'  # Slot 4 —  7:00 PM Lima (UTC midnight +, Sun=0)
    - cron: '0 1 * * 0,2-6'   # Summary — 8:00 PM Lima (UTC midnight +, Sun=0)

  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to post (1–4). Leave blank to infer from Lima time.'
        required: false
        type: string
      dry_run:
        description: 'Generate content but skip the actual Instagram post'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    runs-on: ubuntu-latest

    env:
      TZ: America/Lima
      ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
      KIE_API_KEY:              ${{ secrets.KIE_API_KEY }}
      INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_ACCOUNT_ID:     ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
      GMAIL_SENDER:             ${{ secrets.GMAIL_SENDER }}
      GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
      KIE_IMAGE_COST_USD:       ${{ secrets.KIE_IMAGE_COST_USD }}
      CLOUDINARY_CLOUD_NAME:    ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot and Lima date
        id: ctx
        run: |
          LIMA_DATE=$(date +%Y-%m-%d)
          SLOT=""
          IS_SUMMARY="false"

          # Scheduled runs: map the cron expression directly to a slot.
          # This is immune to GitHub firing the job late — the cron string
          # tells us which slot was intended regardless of actual run time.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 15 * * 1-6")   SLOT=1 ;;
              "0 18 * * 1-6")   SLOT=2 ;;
              "0 21 * * 1-6")   SLOT=3 ;;
              "0 0 * * 0,2-6")  SLOT=4 ;;
              "0 1 * * 0,2-6")  IS_SUMMARY="true" ;;
            esac
          fi

          # Manual runs: use provided slot input, or infer from Lima hour as fallback
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.slot }}" ]; then
              SLOT="${{ inputs.slot }}"
            else
              H=$(date +%H)
              case "$H" in
                10) SLOT=1 ;;
                13) SLOT=2 ;;
                16) SLOT=3 ;;
                19) SLOT=4 ;;
                20) IS_SUMMARY="true" ;;
              esac
            fi
          fi

          echo "slot=$SLOT"             >> $GITHUB_OUTPUT
          echo "is_summary=$IS_SUMMARY" >> $GITHUB_OUTPUT
          echo "lima_date=$LIMA_DATE"   >> $GITHUB_OUTPUT
          echo "Lima time: $(date +%H:%M) | cron: ${{ github.event.schedule }} | slot=$SLOT | summary=$IS_SUMMARY"

      # Restore today's accumulated cost log so totals carry across the 4 daily runs.
      # New cache entry per run; restore-keys picks up the latest one for today.
      - name: Restore cost log cache
        uses: actions/cache@v4
        with:
          path: .tmp/
          key: costs-${{ steps.ctx.outputs.lima_date }}-${{ github.run_id }}
          restore-keys: |
            costs-${{ steps.ctx.outputs.lima_date }}-

      - name: Ensure .tmp exists
        run: mkdir -p .tmp

      - name: Post slot
        if: steps.ctx.outputs.is_summary == 'false' && steps.ctx.outputs.slot != ''
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          CMD="python tools/run_daily_posts.py --slot ${{ steps.ctx.outputs.slot }}"
          if [ "$DRY_RUN" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD"
          $CMD

      - name: Send daily summary
        if: steps.ctx.outputs.is_summary == 'true'
        run: python tools/send_daily_summary.py

      - name: No task matched (check cron or provide a slot)
        if: steps.ctx.outputs.is_summary == 'false' && steps.ctx.outputs.slot == ''
        run: |
          echo "No slot matched. Lima time: $(date +%H:%M) | cron: ${{ github.event.schedule }}"
          echo "For manual runs, always specify a slot (1–4)."
          exit 1
